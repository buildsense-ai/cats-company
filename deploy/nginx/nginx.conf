events {
    worker_connections 1024;
}

http {
    upstream api {
        server server:6061;
    }

    upstream webapp {
        server webapp:3000;
    }

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    # HTTP server - redirect to HTTPS (optional, uncomment in production)
    # server {
    #     listen 80;
    #     server_name localhost;
    #     return 301 https://$host:8443$request_uri;
    # }

    # HTTP server (development mode)
    server {
        listen 80;
        server_name localhost;

        # Health check endpoint
        location /health {
            proxy_pass http://api/health;
            proxy_set_header Host $host;
        }

        # API and WebSocket
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Uploaded files (images, documents)
        location /uploads/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
        }

        location /v0/channels {
            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_read_timeout 86400;
        }

        # Web client
        location / {
            proxy_pass http://webapp;
            proxy_set_header Host $host;
        }
    }

    # HTTPS server
    # Enable after deploy/nginx/ssl/fullchain.pem and privkey.pem are provisioned.
}
